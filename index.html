<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moe Girl</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #000;
  }
  img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
<script>
async function loadImage() {
  try {
    const res = await fetch("https://api.waifu.pics/sfw/waifu");
    const data = await res.json();
    document.getElementById("pic").src = data.url;
  } catch(e) {
    console.error(e);
  }
}
window.onload = loadImage;
</script>
</head>
<body>
  <img id="pic" src="" alt="moe girl">
</body>
</html>
