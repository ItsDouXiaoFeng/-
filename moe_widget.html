<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loli Moe Widget</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
<script>
async function loadImage() {
  try {
    const res = await fetch("https://api.waifu.im/sfw/loli");
    const data = await res.json();
    document.getElementById("pic").src = data.images[0].url + "?v=" + new Date().getTime();
  } catch(e) {
    console.error(e);
  }
}

window.onload = loadImage;
</script>
</head>
<body>
  <img id="pic" src="" alt="Loli Moe">
</body>
</html>
